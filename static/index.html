<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Форма выбора питомца</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <main>
        <h1>Найди себе друга!</h1>

        <form action="/pets/orders" method="POST" class="pet-form">
            <div class="form-group">
                <label for="petType">Тип питомца *</label>
                <select id="petType" name="petType" required>
                    <option value="">-- Выберите --</option>
                    <option value="cat">Кошка</option>
                    <option value="dog">Собака</option>
                    <option value="tiger">Тигр</option>
                </select>
            </div>

            <div class="form-group">
                <label for="gender">Пол *</label>
                <select id="gender" name="gender" required>
                    <option value="">-- Выберите --</option>
                    <option value="boy">Мужской</option>
                    <option value="girl">Женский</option>
                    <option value="none">Не указан</option>
                </select>
            </div>

            <div class="form-group">
                <label for="eyeColor">Цвет глаз (HEX) *</label>
                <input type="color" id="eyeColor" name="eyeColor" required>
            </div>

            <div class="form-group">
                <label for="tailLength">Длина хвоста (см) *</label>
                <input type="number" id="tailLength" name="tailLength" min="0" max="120" step="1" required>
            </div>

            <div class="form-group">
                <label for="name">Имя питомца *</label>
                <input type="text" id="name" name="name" minlength="3" maxlength="50" required>
            </div>

            <div class="form-group">
                <label for="dateOfBirth">Дата рождения *</label>
                <input type="date" id="dateOfBirth" name="dateOfBirth" required>
            </div>

            <div class="form-group">
                <label for="email">Email *</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="form-group">
                <label for="phone">Телефон *</label>
                <input type="tel" id="phone" name="phone" required>
            </div>

            <div class="form-group checkbox">
                <label>
                    <input type="checkbox" name="rules" value="true" required>
                    Я согласен с правилами оформления заказа *
                </label>
            </div>

            <button type="submit">Отправить заявку</button>
            <button type="reset">Сбросить все значения</button>
        </form>

    </main>
</body>

</html>
